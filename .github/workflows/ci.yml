name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Cache build directory
      uses: actions/cache@v5
      with:
        path: build/_deps
        key: ${{ runner.os }}-cryptopp-CRYPTOPP_8_9_0

    - name: Install CMake 4
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "~4.0.0"

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --parallel 4 --config Release

    - name: Smoke test (Unix)
      if: runner.os != 'Windows'
      run: ${{github.workspace}}/build/cryfa 2>&1 | head -1 || true

    - name: Smoke test (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: ${{github.workspace}}\build\Release\cryfa.exe 2>&1 | findstr /n "." | find "1:" || exit 0
